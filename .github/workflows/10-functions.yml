name: 10 - Functions
on: [workflow_dispatch]
jobs:
    demo:
        runs-on: ubuntu-latest
        steps:
            - name: Failing step
              run: exit 1
            - name: Bug step
              if: github.event_name == 'pull_request' && contains(github.event.pull_request.title, 'fix')
              run: echo Bug fix detected
            - name: Run on success
              if: success()
              run: echo Success step
            - name: Run on failure
              if: failure()
              run: echo Run on failure
            - name: Always step
              if: always()
              run: echo Always step
