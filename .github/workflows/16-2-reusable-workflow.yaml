name: 16 - 2 - Reusable Workflows
on: workflow_dispatch

jobs:
    deploy:
        uses: mjbarrera8/202603-githubactions-mjbarrera8/.github/workflows/16-1-reusable-workflow.yaml@main
        with:
            target-directory: 'src'
    print-outputs:
        runs-on: ubuntu-latest
        needs:
            deploy
        steps:
          - name: Print Outputs
            run: |
                echo "Build status: ${{ needs.deploy.outputs.build-status }}"
                echo "URL: ${{ needs.deploy.outputs.url }}"